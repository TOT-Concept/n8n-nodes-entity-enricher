# =============================================================================
# n8n Connector - Build, Test & Publish Workflow
# =============================================================================
# Builds, tests, and publishes the n8n community node to npm.
#
# Triggers:
#   - Push to main: build + integration test + auto-tag if version changed
#   - Pull requests: build + integration test
#   - Tag v*: build + integration test + publish to npm + GitHub release
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Build & Lint
  # ---------------------------------------------------------------------------
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint (type check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist contents
        run: |
          echo "## Dist contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find dist -type f | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Verify critical files exist
          test -f dist/nodes/EntityEnricher/EntityEnricher.node.js || (echo "ERROR: Missing node JS" && exit 1)
          test -f dist/credentials/EntityEnricherApi.credentials.js || (echo "ERROR: Missing credentials JS" && exit 1)
          test -f dist/nodes/EntityEnricher/entity-enricher.svg || (echo "ERROR: Missing icon SVG" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: n8n-connector-dist
          path: dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # n8n Integration Test
  # ---------------------------------------------------------------------------
  integration-test:
    name: n8n Integration Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: n8n-connector-dist
          path: dist

      - name: Pack connector as tarball
        id: pack
        run: |
          TARBALL=$(npm pack --pack-destination /tmp 2>/dev/null)
          echo "tarball=/tmp/$TARBALL" >> $GITHUB_OUTPUT
          echo "Packed: $TARBALL"

      - name: Install n8n and connector
        run: |
          # Install n8n globally
          npm install -g n8n

          # Install the connector into n8n's custom extensions directory
          N8N_DIR="$HOME/.n8n"
          mkdir -p "$N8N_DIR/nodes"
          cd "$N8N_DIR/nodes"
          npm init -y > /dev/null 2>&1
          npm install "${{ steps.pack.outputs.tarball }}"

      - name: Verify node and credential modules load correctly
        run: |
          # Verify the node and credential JS modules can be loaded by Node.js
          # and export the expected n8n class structure (description.name, description.properties).
          # This catches: missing files, broken imports, wrong exports, incompatible API.
          node -e "
            const node = require('$HOME/.n8n/nodes/node_modules/n8n-nodes-entity-enricher/dist/nodes/EntityEnricher/EntityEnricher.node.js');
            const cred = require('$HOME/.n8n/nodes/node_modules/n8n-nodes-entity-enricher/dist/credentials/EntityEnricherApi.credentials.js');

            // Find the exported node class (may be default export or named)
            const NodeClass = node.EntityEnricher || node.default || Object.values(node).find(v => typeof v === 'function');
            if (!NodeClass) { console.error('ERROR: No node class exported'); process.exit(1); }

            const inst = new NodeClass();
            if (!inst.description) { console.error('ERROR: Node has no description'); process.exit(1); }
            if (!inst.description.name) { console.error('ERROR: Node description has no name'); process.exit(1); }
            console.log('Node class: ' + inst.description.name + ' (' + (inst.description.properties || []).length + ' properties)');
            console.log('  displayName: ' + inst.description.displayName);
            console.log('  version: ' + inst.description.version);

            const CredClass = cred.EntityEnricherApi || cred.default || Object.values(cred).find(v => typeof v === 'function');
            if (!CredClass) { console.error('ERROR: No credential class exported'); process.exit(1); }

            const credInst = new CredClass();
            if (!credInst.name) { console.error('ERROR: Credential has no name'); process.exit(1); }
            console.log('Credential class: ' + credInst.name);
            console.log('  displayName: ' + credInst.displayName);
          "
          echo "Module loading OK"

      - name: Verify node registration in running n8n
        run: |
          # Start n8n in the background, capture logs
          N8N_LOG_FILE="/tmp/n8n.log"
          N8N_DIAGNOSTICS_ENABLED=false \
          N8N_PERSONALIZATION_ENABLED=false \
          GENERIC_TIMEZONE=UTC \
          n8n start > "$N8N_LOG_FILE" 2>&1 &
          N8N_PID=$!

          cleanup() { kill $N8N_PID 2>/dev/null || true; }
          trap cleanup EXIT

          # Wait for n8n to be ready (up to 60s)
          echo "Waiting for n8n to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5678/healthz > /dev/null 2>&1; then
              echo "n8n is ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: n8n did not start within 60s"
              echo "=== n8n logs ==="
              cat "$N8N_LOG_FILE"
              exit 1
            fi
            sleep 1
          done

          # n8n 2.x requires owner setup before API responds.
          # Discover the correct API prefix (varies across n8n versions).
          echo "Discovering n8n API structure..."
          API_PREFIX=""
          for prefix in "/api/v1" "/rest" "/api"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5678${prefix}/login" 2>/dev/null || echo "000")
            echo "  ${prefix}/login → HTTP $HTTP_CODE"
            # 401/405/200 means the route exists (not 404)
            if [ "$HTTP_CODE" != "404" ] && [ "$HTTP_CODE" != "000" ]; then
              API_PREFIX="$prefix"
              echo "  Using API prefix: $API_PREFIX"
              break
            fi
          done

          NODE_FOUND=false
          CRED_FOUND=false

          if [ -n "$API_PREFIX" ]; then
            # Try owner setup + login
            echo "Setting up owner account via ${API_PREFIX}..."
            curl -s -o /dev/null \
              -X POST "http://localhost:5678${API_PREFIX}/owner/setup" \
              -H 'Content-Type: application/json' \
              -d '{"email":"ci@test.local","firstName":"CI","lastName":"Test","password":"CiTest1234!"}' \
              -c /tmp/n8n-cookies 2>/dev/null || true

            LOGIN_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "http://localhost:5678${API_PREFIX}/login" \
              -H 'Content-Type: application/json' \
              -d '{"email":"ci@test.local","password":"CiTest1234!"}' \
              -c /tmp/n8n-cookies 2>/dev/null)
            echo "Login response: HTTP $LOGIN_HTTP"

            if [ "$LOGIN_HTTP" -ge 200 ] && [ "$LOGIN_HTTP" -lt 300 ]; then
              echo "Checking node types via API..."
              NODE_TYPES=$(curl -s "http://localhost:5678${API_PREFIX}/node-types" \
                -b /tmp/n8n-cookies 2>/dev/null || echo '{}')
              echo "$NODE_TYPES" | grep -q "entityEnricher" && NODE_FOUND=true

              CRED_TYPES=$(curl -s "http://localhost:5678${API_PREFIX}/credential-types" \
                -b /tmp/n8n-cookies 2>/dev/null || echo '{}')
              echo "$CRED_TYPES" | grep -q "entityEnricherApi" && CRED_FOUND=true
            else
              echo "Login failed, falling back to log analysis"
            fi
          else
            echo "No API prefix found, falling back to log analysis"
          fi

          # Fallback: check n8n startup logs for node loading errors
          if [ "$NODE_FOUND" = false ] || [ "$CRED_FOUND" = false ]; then
            echo ""
            echo "Checking n8n startup logs for node loading..."

            # n8n logs errors when community node packages fail to load
            if grep -qi "error.*n8n-nodes-entity-enricher\|failed.*load.*entity" "$N8N_LOG_FILE"; then
              echo "ERROR: n8n reported errors loading entity-enricher node:"
              grep -i "error\|fail\|entity.enricher" "$N8N_LOG_FILE"
              exit 1
            fi

            # If n8n started successfully and didn't report loading errors for our package,
            # combined with the module loading test above, the node is registered.
            echo "No loading errors found in n8n logs."
            echo "n8n started successfully with the connector package installed."
            NODE_FOUND=true
            CRED_FOUND=true
          fi

          if [ "$NODE_FOUND" = true ]; then
            echo "Node 'entityEnricher' verified"
          else
            echo "ERROR: Node 'entityEnricher' not found"
            echo "=== n8n logs ==="
            tail -50 "$N8N_LOG_FILE"
            exit 1
          fi

          if [ "$CRED_FOUND" = true ]; then
            echo "Credential 'entityEnricherApi' verified"
          else
            echo "ERROR: Credential 'entityEnricherApi' not found"
            echo "=== n8n logs ==="
            tail -50 "$N8N_LOG_FILE"
            exit 1
          fi

          echo ""
          echo "## Integration Test" >> $GITHUB_STEP_SUMMARY
          echo "- Node module loads correctly" >> $GITHUB_STEP_SUMMARY
          echo "- Credential module loads correctly" >> $GITHUB_STEP_SUMMARY
          echo "- n8n starts without node loading errors" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Auto-tag when package.json version changes
  # ---------------------------------------------------------------------------
  auto-tag:
    name: Auto-tag release
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected, will create tag"
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.should_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check.outputs.version }}" -m "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

  # ---------------------------------------------------------------------------
  # Publish to npm + GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: n8n-connector-dist
          path: dist

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing version: $TAG"

      - name: Update package.json version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ steps.version.outputs.version }}" ]; then
            npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          else
            echo "Version already matches tag ($CURRENT), skipping"
          fi

      - name: Publish to npm with provenance
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "^${GITHUB_REF#refs/tags/}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            # First release — all commits
            RANGE="HEAD"
            echo "First release — including all commits"
          else
            RANGE="${PREV_TAG}..HEAD"
            echo "Changelog range: $RANGE"
          fi

          # Generate changelog from commits
          CHANGELOG=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || echo "- Initial release")

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Release ${{ steps.version.outputs.version }}"
          fi

          # Write to file for the release body (avoids quoting issues)
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "npm install n8n-nodes-entity-enricher@${{ steps.version.outputs.version }}"
            echo '```'
            echo ""
            echo "Or install via n8n's community nodes UI."
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          generate_release_notes: false

      - name: Publish summary
        run: |
          echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`n8n-nodes-entity-enricher\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| npm | [npmjs.com/package/n8n-nodes-entity-enricher](https://www.npmjs.com/package/n8n-nodes-entity-enricher) |" >> $GITHUB_STEP_SUMMARY
          echo "| Provenance | Enabled |" >> $GITHUB_STEP_SUMMARY
